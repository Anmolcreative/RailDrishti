apiVersion: apps/v1
kind: Deployment
metadata:
  name: raildrishti-producer
  labels:
    app: raildrishti
spec:
  replicas: 2
  selector:
    matchLabels:
      app: raildrishti-producer
  template:
    metadata:
      labels:
        app: raildrishti-producer
    spec:
      containers:
      - name: raildrishti-producer
        image: deployment-raildrishti-producer:latest
        env:
        - name: KAFKA_BROKER
          value: kafka:9092
        - name: INFLUX_URL
          value: http://influxdb:8086
        - name: REDIS_URL
          value: redis://redis:6379
        resources:
          requests:
            memory: 128Mi
            cpu: 250m
          limits:
            memory: 256Mi
            cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: raildrishti-producer-service
spec:
  selector:
    app: raildrishti-producer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7.2
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: 64Mi
            cpu: 100m
          limits:
            memory: 128Mi
            cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  labels:
    app: influxdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
      - name: influxdb
        image: influxdb:2.7
        ports:
        - containerPort: 8086
        env:
        - name: DOCKER_INFLUXDB_INIT_MODE
          value: setup
        - name: DOCKER_INFLUXDB_INIT_USERNAME
          value: admin
        - name: DOCKER_INFLUXDB_INIT_PASSWORD
          value: raildrishti123
        - name: DOCKER_INFLUXDB_INIT_ORG
          value: raildrishti
        - name: DOCKER_INFLUXDB_INIT_BUCKET
          value: train-data
        - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
          value: raildrishti-token-2026
        resources:
          requests:
            memory: 256Mi
            cpu: 250m
          limits:
            memory: 512Mi
            cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb-service
spec:
  selector:
    app: influxdb
  ports:
  - protocol: TCP
    port: 8086
    targetPort: 8086

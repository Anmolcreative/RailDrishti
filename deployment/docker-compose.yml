
  version: "3.9"

services:
  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: raildrishti_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── ML Inference (FastAPI + LightGBM) ────────────────────────────────────────
  ml_inference:
    build:
      context: .
      dockerfile: Dockerfile.ml
    container_name: raildrishti_ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/ml/model/lightgbm_recommender.pkl
      - SCHEMA_PATH=/app/ml/model/feature_schema.json
      - ENCODER_PATH=/app/ml/model/label_encoder.pkl
    volumes:
      - ./ml/model:/app/ml/model:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy

  # ── NTES Scraper (Node + Puppeteer) ──────────────────────────────────────────
  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: raildrishti_scraper
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://redis:6379
      - RAILAPI_KEY=${RAILAPI_KEY:-}
      - OPENWEATHERMAP_KEY=${OPENWEATHERMAP_KEY:-}
      - SCRAPER_INTERVAL_MS=30000
    depends_on:
      redis:
        condition: service_healthy
    shm_size: "256mb"          # Chrome needs shared memory

  # ── WebSocket Server (Node) ───────────────────────────────────────────────────
  ws_server:
    build:
      context: .
      dockerfile: Dockerfile.ws
    container_name: raildrishti_ws
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - ML_API_URL=http://ml_inference:8000
      - WS_PORT=3000
    depends_on:
      redis:
        condition: service_healthy
      ml_inference:
        condition: service_healthy

  # ── React Frontend (Nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: raildrishti_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - ws_server

volumes:
  redis_data:
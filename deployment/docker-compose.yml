version: '3.8'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: raildrishti123
      DOCKER_INFLUXDB_INIT_ORG: raildrishti
      DOCKER_INFLUXDB_INIT_BUCKET: train-data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: raildrishti-token-2026
    volumes:
      - influxdb-data:/var/lib/influxdb2

  redis:
    image: redis:7.2
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  raildrishti-producer:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: raildrishti_producer
    depends_on:
      - kafka
      - redis
    environment:
      KAFKA_BROKER: kafka:9092
      API_CONFIG_PATH: backend/data/api_config.json
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RAPIDAPI_KEY: "${RAPIDAPI_KEY:-}"
      RAPIDAPI_HOST: "${RAPIDAPI_HOST:-}"
    command: ["python", "backend/kafka/producer.py"]
    restart: unless-stopped

  raildrishti-api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: raildrishti_api
    depends_on:
      - kafka
      - redis
    environment:
      KAFKA_BROKER: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "8001:8001"
    command: ["uvicorn", "backend.api.server:app", "--host", "0.0.0.0", "--port", "8001"]
    restart: unless-stopped

  raildrishti-inference:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: raildrishti_inference
    depends_on:
      - redis
    ports:
      - "8000:8000"
    command: ["uvicorn", "ml.inference_server:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

volumes:
  influxdb-data:
  redis-data:
